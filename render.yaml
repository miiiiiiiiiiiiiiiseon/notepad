# Render Blueprint - 웹 서비스(무료). DB 는 외부 Turso(libSQL) 사용.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: notepad
    runtime: node
    plan: free                # 무료 웹 서비스 (15분 비활성 시 슬립)
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      # Turso 자격증명은 비밀값이므로 코드에 커밋하지 않고
      # Render 대시보드(서비스 → Environment)에서 직접 값을 입력합니다.
      - key: TURSO_URL
        sync: false
      - key: TURSO_TOKEN
        sync: false
      - key: SESSION_SECRET
        generateValue: true   # Render 가 랜덤 시크릿 자동 생성
      - key: NODE_VERSION
        value: "20"
